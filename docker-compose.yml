services:
  db:
    image: postgres:16
    container_name: analytics_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: analytics_db
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  bot:
    build: .
    container_name: tg_bot
    restart: unless-stopped
    env_file:
      - .env
    depends_on:
      - db

volumes:
  pgdata: